<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Docs Fix — AI PDF Editor</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: 'DM Sans', sans-serif; margin:0; background:#0f172a; color:white; }
    .top { display:flex; justify-content:space-between; padding:15px; background:#1e293b; }
    button { padding:10px 15px; border:none; border-radius:6px; cursor:pointer; }
    #chatBox { position:fixed; right:20px; bottom:20px; width:300px; background:#1e293b; padding:10px; border-radius:10px; display:none; }
    #chatMessages { height:200px; overflow:auto; font-size:14px; margin-bottom:10px; }
    input { width:100%; padding:8px; border-radius:5px; border:none; }
  </style>
</head>

<body>

<div class="top">
  <h3>📄 Docs Fix AI</h3>
  <div>
    <button onclick="openFile()">Open PDF</button>
    <button onclick="buyAccess()">💳 Unlock AI ($5)</button>
    <button onclick="toggleChat()">🤖 AI</button>
  </div>
</div>

<input type="file" id="filePicker" hidden accept="application/pdf"/>

<canvas id="pdfCanvas"></canvas>

<!-- 🤖 CHAT BOX -->
<div id="chatBox">
  <div id="chatMessages"></div>
  <input type="text" id="chatInput" placeholder="Ask about PDF..." onkeydown="sendMessage(event)">
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let hasAccess = false; // 🔐 PAYWALL

function buyAccess() {
  alert("💳 Payment system coming soon! (Stripe)");
  hasAccess = true;
  alert("✅ Access unlocked (demo)");
}

function toggleChat() {
  if (!hasAccess) {
    alert("❌ Buy subscription first!");
    return;
  }
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function addMessage(text, sender="user") {
  const msg = document.createElement("div");
  msg.innerText = (sender === "user" ? "🧑: " : "🤖: ") + text;
  document.getElementById("chatMessages").appendChild(msg);
}

async function sendMessage(e) {
  if (e.key !== "Enter") return;

  const input = document.getElementById("chatInput");
  const text = input.value;
  input.value = "";

  addMessage(text, "user");

  // 🔥 OPENAI API CALL
  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer YOUR_API_KEY"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await response.json();
  const reply = data.choices[0].message.content;

  addMessage(reply, "ai");
}

function openFile() {
  document.getElementById("filePicker").click();
}

document.getElementById("filePicker").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function () {
    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
    const page = await pdf.getPage(1);

    const canvas = document.getElementById("pdfCanvas");
    const ctx = canvas.getContext("2d");

    const viewport = page.getViewport({ scale: 1.5 });
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    await page.render({ canvasContext: ctx, viewport }).promise;
  };

  reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
